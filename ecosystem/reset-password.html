<!doctype html>
<html lang="en">
  <head>
    <title>Frangain | Reset Password</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#20509e" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/img/Frangain.png" />
    <link href="../img/favicon.ico" rel="shortcut icon" />
    <link href="https://fonts.googleapis.com/css?family=Lato" rel="stylesheet" />
    <link rel="stylesheet" href="../css/bootstrap.min.css" />
    <link rel="stylesheet" href="../css/font-awesome.min.css" />
    <link rel="stylesheet" href="../css/themify-icons.css" />
    <link rel="stylesheet" href="../css/owl.carousel.css" />
    <link rel="stylesheet" href="../css/style.css" />
    <style>
      .password-page { min-height: 100vh; padding: 120px 0 80px; background: #f3f7f9 url("../img/page-info-bg.png") no-repeat right top / cover; }
      .password-panel { max-width: 520px; margin: 0 auto; padding: 42px; background: #fff; border-radius: 8px; box-shadow: 0 23px 49px rgba(33, 54, 61, 0.12); }
      .password-panel h1 { margin-bottom: 12px; font-size: 38px; }
      .password-panel p { margin-bottom: 28px; }
      .password-form label { display: block; margin-bottom: 8px; color: #20509e; font-family: "Futura", sans-serif; }
      .password-form input { width: 100%; height: 50px; border: 1px solid #ebebeb; border-radius: 4px; padding: 0 16px; color: #20509e; font-size: 16px; }
      .password-form input:focus { border-color: #16d0c5; }
      .field-group { margin-bottom: 18px; }
      .password-field { position: relative; }
      .password-field input { padding-right: 52px; }
      .toggle-password { position: absolute; right: 12px; top: 50%; width: 32px; height: 32px; border: 0; background: transparent; color: #75849a; cursor: pointer; transform: translateY(-50%); }
      .form-error { min-height: 20px; margin-top: 6px; color: #d93025; font-size: 14px; }
      .form-message { display: none; margin-bottom: 20px; padding: 14px 16px; border-radius: 4px; line-height: 1.6; }
      .form-message.error { display: block; background: #fff4f4; color: #9f1c1c; border: 1px solid #f0b5b5; }
      .form-message.success { display: block; background: #eefaf7; color: #20509e; border: 1px solid #16d0c5; }
      .password-actions .site-btn { width: 100%; border: 0; }
      .signin-link { margin-top: 22px; text-align: center; }
      .signin-link a { color: #16d0c5; font-family: "Futura", sans-serif; }
      @media only screen and (max-width: 767px) { .password-page { padding: 130px 15px 60px; } .password-panel { padding: 28px 20px; } .password-panel h1 { font-size: 32px; } }
    </style>
  </head>
  <body>
    <header class="header-section clearfix">
      <div class="container-fluid">
        <a href="../index.html" class="site-logo"><img src="../img/Frangain.png" alt="Frangain Logo" style="max-height: 60px; width: auto; display: inline-block" /></a>
        <div class="responsive-bar"><i class="fa fa-bars"></i></div>
        <nav class="main-menu">
          <ul class="menu-list">
            <li><a href="/" style="color: #000">Home</a></li>
            <li><a href="../about.html" style="color: #000">About</a></li>
            <li><a href="../story-manifesto.html">Story & Manifesto</a></li>
            <li><a href="../whitepaper.html">Whitepaper</a></li>
            <li><a href="../how_to_buy.html">How to Buy</a></li>
            <li><a href="/ecosystem/">Ecosystem</a></li>
            <li><a href="../contact.html">Contact</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="password-page">
      <div class="container">
        <div class="password-panel">
          <h1>Reset Password</h1>
          <p>Create a new password for your verified FRANGAIN Ecosystem account.</p>
          <div id="formMessage" class="form-message" role="status" aria-live="polite"></div>
          <form id="resetPasswordForm" class="password-form" novalidate>
            <div class="field-group">
              <label for="password">New Password</label>
              <div class="password-field">
                <input id="password" name="password" type="password" autocomplete="new-password" required />
                <button class="toggle-password" type="button" data-target="password" aria-label="Show password"><i class="fa fa-eye"></i></button>
              </div>
              <div id="passwordError" class="form-error"></div>
            </div>
            <div class="field-group">
              <label for="confirmPassword">Confirm New Password</label>
              <div class="password-field">
                <input id="confirmPassword" name="confirmPassword" type="password" autocomplete="new-password" required />
                <button class="toggle-password" type="button" data-target="confirmPassword" aria-label="Show confirm password"><i class="fa fa-eye"></i></button>
              </div>
              <div id="confirmPasswordError" class="form-error"></div>
            </div>
            <div class="password-actions">
              <button id="submitButton" class="site-btn sb-gradients" type="submit">Reset Password</button>
            </div>
          </form>
          <div class="signin-link">Ready to continue? <a href="login.html">Sign In</a></div>
        </div>
      </div>
    </main>

    <script src="../js/jquery-3.2.1.min.js"></script>
    <script src="../js/owl.carousel.min.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/pwa.js"></script>
    <script>
      (function () {
        var form = document.getElementById('resetPasswordForm');
        var formMessage = document.getElementById('formMessage');
        var submitButton = document.getElementById('submitButton');
        var token = new URLSearchParams(window.location.search).get('token') || '';

        function setMessage(type, message) {
          formMessage.className = 'form-message ' + type;
          formMessage.textContent = message;
        }

        function clearErrors() {
          document.getElementById('passwordError').textContent = '';
          document.getElementById('confirmPasswordError').textContent = '';
          formMessage.className = 'form-message';
          formMessage.textContent = '';
        }

        function showErrors(errors) {
          Object.keys(errors || {}).forEach(function (name) {
            var target = document.getElementById(name + 'Error');
            if (target) {
              target.textContent = errors[name];
            }
          });
        }

        document.querySelectorAll('.toggle-password').forEach(function (button) {
          button.addEventListener('click', function () {
            var input = document.getElementById(button.getAttribute('data-target'));
            var icon = button.querySelector('i');
            var isHidden = input.type === 'password';
            input.type = isHidden ? 'text' : 'password';
            button.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
            icon.className = isHidden ? 'fa fa-eye-slash' : 'fa fa-eye';
          });
        });

        if (!token) {
          setMessage('error', 'This password reset link is missing its secure token.');
          form.style.display = 'none';
        }

        form.addEventListener('submit', function (event) {
          event.preventDefault();
          clearErrors();
          submitButton.disabled = true;
          submitButton.textContent = 'Resetting...';

          fetch('/api/password/reset', {
            method: 'POST',
            credentials: 'same-origin',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              token: token,
              password: document.getElementById('password').value,
              confirmPassword: document.getElementById('confirmPassword').value,
            }),
          })
            .then(function (response) {
              return response.json().then(function (data) {
                return { ok: response.ok, data: data };
              });
            })
            .then(function (result) {
              if (!result.ok) {
                showErrors(result.data.errors);
                setMessage('error', result.data.message || 'Unable to reset password.');
                return;
              }

              form.reset();
              form.style.display = 'none';
              setMessage('success', result.data.message || 'Password reset successfully.');
            })
            .catch(function () {
              setMessage('error', 'Unable to reset password. Please try again later.');
            })
            .finally(function () {
              submitButton.disabled = false;
              submitButton.textContent = 'Reset Password';
            });
        });
      })();
    </script>
  </body>
</html>
